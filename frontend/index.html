<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda La Joyita - Catálogo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header style="background: #333; color: white; padding: 20px; text-align: center;">
        <h1>Nuestro Catálogo</h1>
        <p>Tienda de Alimentos La Joyita</p>
    </header>

    <main style="padding: 20px; max-width: 1200px; margin: 0 auto;">
        <div id="contenedor-productos">
            <p>Cargando productos de La Joyita...</p>
        </div>
    </main>

    <aside class="seccion-carrito">
         <h3>Tu Carrito (<span id="contador-carrito">0</span>)</h3>
         <ul id="lista-carrito">
         </ul>
         <div class="total-seccion">
              <strong>Total:</strong> <span id="total-carrito">$0.00</span>
         </div>
    </aside>  
    
    <script src="js/app.js"></script>
</body>
</html>
