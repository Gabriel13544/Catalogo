<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - BikerShop</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div id="pantalla-login" style="position: fixed; top:0; left:0; width:100%; height:100%; background: #111; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; font-family: sans-serif;">
        <h2 style="margin-bottom: 10px; color: #ffc107;">Acceso Restringido</h2>
        <p style="margin-bottom: 20px; color: #ccc;">Introduce la contraseña de administrador para continuar:</p>
        <div style="display: flex; flex-direction: column; width: 280px; gap: 10px;">
            <input type="password" id="input-password" placeholder="Contraseña" style="padding: 12px; border-radius: 5px; border: none; text-align: center; font-size: 16px; color: black;">
            <button id="btn-ingresar" onclick="verificarPassword()" style="padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;">Ingresar</button>
        </div>
        <p id="error-login" style="color: #dc3545; margin-top: 15px; display: none; font-weight: bold; text-align: center; max-width: 260px;">❌ Contraseña incorrecta o error de conexión. Inténtalo de nuevo.</p>
    </div>

    <header class="encabezado">
        <h1>Panel de Administración</h1>
        <p>Gestión de Inventario - BikerShop</p>
    </header>

    <div class="contenedor-principal" style="max-width: 700px; display: block;">
        
        <main class="tarjeta-producto" style="padding: 30px; margin-bottom: 30px;">
            <h2 style="margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px;">Añadir / Editar Producto</h2>
            
            <form id="formulario-producto" class="formulario-admin">
                <input type="hidden" id="producto-id">

                <div class="grupo-form">
                    <label for="nombre">Nombre del Producto:</label>
                    <input type="text" id="nombre" placeholder="Ej. Bicicleta de Montaña" required>
                </div>

                <div class="grupo-form">
                    <label for="precio">Precio ($):</label>
                    <input type="number" step="0.01" id="precio" placeholder="Ej. 450.00" required>
                </div>

                <div class="grupo-form">
                    <label for="imagen-archivo">Imagen del Producto (Desde tu dispositivo):</label>
                    <input type="file" id="imagen-archivo" accept="image/*">
                    <div id="vista-previa-imagen" style="margin-top: 10px;"></div>
                </div>

                <div class="grupo-form">
                    <label for="seccion">Seleccionar Sección/Categoría:</label>
                    <select id="seccion" required>
                        <option value="" disabled selected>-- Elige una sección --</option>
                        <option value="A">Sección A</option>
                        <option value="B">Sección B</option>
                        <option value="C">Sección C</option>
                        <option value="D">Sección D</option>
                        <option value="E">Sección E</option>
                        <option value="F">Sección F</option>
                        <option value="G">Sección G</option>
                        <option value="H">Sección H</option>
                        <option value="I">Sección I</option>
                        <option value="J">Sección J</option>
                        <option value="K">Sección K</option>
                    </select>
                </div>

                <div class="grupo-form">
                    <label for="descripcion">Descripción:</label>
                    <textarea id="descripcion" placeholder="Detalles del producto..." rows="3"></textarea>
                </div>

                <button type="submit" id="btn-guardar" class="btn-accion">Guardar Producto</button>
                <button type="button" id="btn-cancelar" class="btn-accion" style="display: none; background-color: #dc3545; margin-top: 10px;" onclick="cancelarEdicion()">Cancelar Edición</button>
            </form>
        </main>

        <aside class="tarjeta-producto" style="padding: 30px;">
            <h3 style="margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px;">Productos Existentes</h3>
            <div id="lista-productos-existentes" class="lista-admin"></div>
        </aside>

    </div>

    <script src="js/admin.js"></script>
</body>
</html>
